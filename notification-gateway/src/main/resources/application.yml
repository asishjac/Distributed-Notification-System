server:
  port: 8081

spring:
  application:
    name: notification-gateway
  
  # Reactive Coroutine R2DBC Connection to Docker PostgreSQL
  r2dbc:
    url: r2dbc:postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@localhost:5433/notification_db
    # This enables to just throw a schema.sql file and have it auto-create tables
    generate-unique-name: false
  
  sql:
    init:
      mode: always # Always execute schema.sql on startup to create tables

# AWS LocalStack Settings
aws:
  region: us-east-1
  endpoint: http://localhost:4566
  sqs:
    queue-url: http://localhost:4566/000000000000/notification-queue
